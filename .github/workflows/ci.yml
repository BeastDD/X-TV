name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version is intentionally omitted so the action reads the exact version
        # from the "packageManager" field in the root package.json (pnpm@9.0.0).
        # This prevents the "Multiple versions of pnpm specified" error.

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec turbo lint --filter=web

      - name: Type check
        run: pnpm exec turbo check-types --filter=web

      - name: Create minimal .env.local for web build (real secrets are only needed at runtime)
        run: |
          mkdir -p apps/web
          cat > apps/web/.env.local << 'EOF'
          # These are build-time dummies only.
          # They satisfy the top-level checks in lib/auth.ts and lib/supabase/*.
          # Real values must come from the deployment platform (Vercel, etc.).
          AUTH_SECRET=build-time-dummy-secret-do-not-use-in-prod
          AUTH_TWITTER_ID=build-dummy
          AUTH_TWITTER_SECRET=build-dummy
          NEXT_PUBLIC_SUPABASE_URL=https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy-for-build-only
          SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy-service-role-for-build-only
          EOF

      - name: Build web
        run: pnpm exec turbo build --filter=web

      # Lint and typecheck are now strict (no fallbacks). They will fail the job on errors.
      # Tests (Vitest/Playwright) deferred to later sprints.

      # Add Vitest / Playwright here in a follow-up when tests are written
      # - name: Test
      #   run: pnpm exec turbo test --filter=web
